name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.8.3
        with:
          pixi-version: latest
          cache: true

      - name: Build
        run: pixi run build

      - name: Start server (background)
        run: ./build/server/HogwartsServer &

      - name: Wait for server to be ready
        run: sleep 1

      - name: Test
        run: pixi run test
